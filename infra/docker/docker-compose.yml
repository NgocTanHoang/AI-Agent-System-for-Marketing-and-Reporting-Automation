services:
  ai-marketing-web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: ai-marketing-web
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
    environment:
      HEALTHCHECK_MODE: web
      HEALTHCHECK_URL: http://127.0.0.1:8000/api/health
      NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    env_file:
      - ../../.env
    restart: unless-stopped

  ai-marketing-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: ai-marketing-worker
    profiles: ["batch"]
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
    environment:
      HEALTHCHECK_MODE: worker
      NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    env_file:
      - ../../.env
    restart: "no"
