version: '3.8'

services:
  ai-marketing-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-marketing-agent
    volumes:
      # Mount data and logs directories for persistence
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    env_file:
      - .env
    restart: unless-stopped
    # Uncomment the following if you want to run on a schedule
    # deploy:
    #   restart_policy:
    #     condition: on-failure
    #     delay: 5s
    #     max_attempts: 3
    #     window: 60s

  # If you have a web interface, you can use this service
  # ai-marketing-web:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.web
  #   container_name: ai-marketing-web
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./data:/app/data
  #     - ./logs:/app/logs
  #   env_file:
  #     - .env
  #   depends_on:
  #     - ai-marketing-agent

# Volumes for data persistence
volumes:
  data:
  logs: