name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall app.py main.py src tests

      - name: Run backend tests
        run: python -m pytest tests -q

      - name: Lint critical Python errors
        run: |
          pip install flake8
          flake8 app.py main.py src tests --count --select=E9,F63,F7,F82 --show-source --statistics

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: docker build -f infra/docker/Dockerfile .

      - name: Build worker image
        run: docker build -f infra/docker/Dockerfile.worker .

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, docker-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-marketing-agent-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-marketing-agent-web:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-marketing-agent-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-marketing-agent-worker:${{ github.sha }}
